<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/bold/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/fill/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/duotone/style.css">
<style>
body{margin:0;background:var(--bg);color:var(--text-strong);font-family:var(--font-body);padding:24px}
.row{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-start;margin-bottom:18px}
.sub{font-family:var(--font-mono);font-size:10px;letter-spacing:.2em;color:var(--mute);text-transform:uppercase;width:100%;margin-bottom:-2px}
</style>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../jsx-loader.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module" data-presets="react">
import React from 'react';
import { createRoot } from 'react-dom/client';
const { Toast } = await arenaImport('../../components/feedback/Toast.jsx');
const { ConfirmDialog } = await arenaImport('../../components/feedback/ConfirmDialog.jsx');
const { EmptyState } = await arenaImport('../../components/feedback/EmptyState.jsx');
const { ErrorState } = await arenaImport('../../components/feedback/ErrorState.jsx');
const { CommandPalette } = await arenaImport('../../components/navigation/CommandPalette.jsx');
const { Button } = await arenaImport('../../components/forms/Button.jsx');
function Demo(){
  const [confirm,setConfirm]=React.useState(false);
  const [palette,setPalette]=React.useState(false);
  React.useEffect(()=>{const h=e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();setPalette(true);}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[]);
  return (
    <div>
      <div className="sub">Toast with action — Undo (H3) · Retry/View logs (H9)</div>
      <div className="row">
        <Toast tone="neutral" title="Deployment archived" action={{label:'Undo',onClick:()=>{}}} onClose={()=>{}}/>
        <Toast tone="danger" title="Pipeline failed" message="e2e tests in checkout" action={{label:'View logs',onClick:()=>{}}} onClose={()=>{}}/>
      </div>
      <div className="sub">ConfirmDialog (H3/H5) · CommandPalette (H7)</div>
      <div className="row">
        <Button variant="danger" onClick={()=>setConfirm(true)}>Delete project…</Button>
        <Button variant="secondary" onClick={()=>setPalette(true)}>Command palette (⌘K)</Button>
      </div>
      <div className="sub">EmptyState · ErrorState (H9)</div>
      <div className="row">
        <EmptyState style={{flex:'1 1 320px'}} icon={<i className="ph-duotone ph-folder-open"/>} title="No projects yet" message="Create your first project to start deploying." action={<Button>New project</Button>}/>
        <ErrorState style={{flex:'1 1 320px'}} icon={<i className="ph-fill ph-warning-octagon"/>} title="Couldn't load the panel" message="No connection to the metrics service." code="ERR_UPSTREAM_504" onRetry={()=>{}} secondaryAction={<Button variant="secondary">View logs</Button>}/>
      </div>
      <ConfirmDialog open={confirm} destructive requireText="DELETE" title="Delete project" confirmLabel="Delete permanently" onCancel={()=>setConfirm(false)} onConfirm={()=>setConfirm(false)}>
        This action cannot be undone. 4 deployments and their history will be deleted.
      </ConfirmDialog>
      <CommandPalette open={palette} onClose={()=>setPalette(false)} commands={[
        {label:'Deploy to production',icon:<i className="ph-bold ph-rocket-launch"/>,shortcut:'D',onRun:()=>{}},
        {label:'Roll back last deployment',icon:<i className="ph-bold ph-arrow-counter-clockwise"/>,onRun:()=>{}},
        {label:'Open Projects',icon:<i className="ph-bold ph-squares-four"/>,onRun:()=>{}},
        {label:'Go to Settings',icon:<i className="ph-bold ph-gear-six"/>,onRun:()=>{}},
      ]}/>
    </div>
  );
}
createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
