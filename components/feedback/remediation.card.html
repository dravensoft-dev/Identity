<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/bold/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/fill/style.css">

<script src="../../jsx-loader.js"></script>

<body>
<div id="root"></div>
<script type="text/babel" data-type="module" data-presets="react">
import React from 'react';
import { createRoot } from 'react-dom/client';
const { Toast } = await arenaImport('../../components/feedback/Toast.jsx');
const { ConfirmDialog } = await arenaImport('../../components/feedback/ConfirmDialog.jsx');
const { EmptyState } = await arenaImport('../../components/feedback/EmptyState.jsx');
const { ErrorState } = await arenaImport('../../components/feedback/ErrorState.jsx');
const { CommandPalette } = await arenaImport('../../components/navigation/CommandPalette.jsx');
const { Button } = await arenaImport('../../components/forms/Button.jsx');
function Demo(){
  const [confirm,setConfirm]=React.useState(false);
  const [palette,setPalette]=React.useState(false);
  React.useEffect(()=>{const h=e=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();setPalette(true);}};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);},[]);
  return (
    <div>
      <div className="sub">Toast con acción — Deshacer (H3) · Reintentar/Ver logs (H9)</div>
      <div className="row">
        <Toast tone="neutral" title="Entrega archivada" action={{label:'Deshacer',onClick:()=>{}}} onClose={()=>{}}/>
        <Toast tone="danger" title="Fallo en el pipeline" message="tests e2e en checkout" action={{label:'Ver logs',onClick:()=>{}}} onClose={()=>{}}/>
      </div>
      <div className="sub">ConfirmDialog (H3/H5) · CommandPalette (H7)</div>
      <div className="row">
        <Button variant="danger" onClick={()=>setConfirm(true)}>Eliminar proyecto…</Button>
        <Button variant="secondary" onClick={()=>setPalette(true)}>Paleta de comandos (⌘K)</Button>
      </div>
      <div className="sub">EmptyState · ErrorState (H9)</div>
      <div className="row">
        <EmptyState style={{flex:'1 1 320px'}} icon={<i className="ph-duotone ph-folder-open"/>} title="Aún no hay proyectos" message="Crea tu primer proyecto para empezar a desplegar." action={<Button>Nuevo proyecto</Button>}/>
        <ErrorState style={{flex:'1 1 320px'}} icon={<i className="ph-fill ph-warning-octagon"/>} title="No se pudo cargar el panel" message="Sin conexión con el servicio de métricas." code="ERR_UPSTREAM_504" onRetry={()=>{}} secondaryAction={<Button variant="secondary">Ver logs</Button>}/>
      </div>
      <ConfirmDialog open={confirm} destructive requireText="ELIMINAR" title="Eliminar proyecto" confirmLabel="Eliminar definitivamente" onCancel={()=>setConfirm(false)} onConfirm={()=>setConfirm(false)}>
        Esta acción no se puede deshacer. Se borrarán 4 despliegues y su historial.
      </ConfirmDialog>
      <CommandPalette open={palette} onClose={()=>setPalette(false)} commands={[
        {label:'Desplegar a producción',icon:<i className="ph-bold ph-rocket-launch"/>,shortcut:'D',onRun:()=>{}},
        {label:'Revertir último despliegue',icon:<i className="ph-bold ph-arrow-counter-clockwise"/>,onRun:()=>{}},
        {label:'Abrir Proyectos',icon:<i className="ph-bold ph-squares-four"/>,onRun:()=>{}},
        {label:'Ir a Ajustes',icon:<i className="ph-bold ph-gear-six"/>,onRun:()=>{}},
      ]}/>
    </div>
  );
}
createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
