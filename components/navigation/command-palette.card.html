<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../styles.css"><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/bold/style.css">
<style>body{margin:0;background:var(--bg);color:var(--text-strong);font-family:var(--font-body);padding:24px}.sub{font-family:var(--font-mono);font-size:10px;letter-spacing:.2em;color:var(--mute);text-transform:uppercase;margin-bottom:10px}</style>
<script type="importmap">
{"imports":{"react":"https://esm.sh/react@18","react/jsx-runtime":"https://esm.sh/react@18/jsx-runtime","react-dom/client":"https://esm.sh/react-dom@18/client"}}
</script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../jsx-loader.js"></script></head><body><div id="root"></div>
<script type="text/babel" data-type="module" data-presets="react">
import React from 'react';
import { createRoot } from 'react-dom/client';
const { CommandPalette } = await arenaImport('../../components/navigation/CommandPalette.jsx');
const { Button } = await arenaImport('../../components/forms/Button.jsx');
const commands = [
  {id:'deploy',label:'Deploy to production',hint:'client portal',icon:<i className="ph-bold ph-rocket-launch"/>,shortcut:'⌘D'},
  {id:'logs',label:'View build logs',hint:'build 4821',icon:<i className="ph-bold ph-terminal-window"/>},
  {id:'new',label:'New project',icon:<i className="ph-bold ph-plus-circle"/>,shortcut:'⌘N'},
  {id:'invite',label:'Invite teammate',hint:'members settings',icon:<i className="ph-bold ph-user-plus"/>},
  {id:'theme',label:'Toggle theme',icon:<i className="ph-bold ph-moon"/>},
  {id:'docs',label:'Open documentation',hint:'arena design system',icon:<i className="ph-bold ph-book-open"/>},
];
function Demo(){
  const[open,setOpen]=React.useState(true);
  React.useEffect(()=>{
    const h=(e)=>{if((e.metaKey||e.ctrlKey)&&e.key.toLowerCase()==='k'){e.preventDefault();setOpen(true);}};
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[]);
  return(<div>
    <div className="sub">Press Cmd/Ctrl+K · arrows to move · Enter to run · Esc to close</div>
    <Button variant="secondary" size="sm" onClick={()=>setOpen(true)}>Open palette</Button>
    <CommandPalette open={open} onClose={()=>setOpen(false)} commands={commands} />
  </div>);
}
createRoot(document.getElementById('root')).render(<Demo/>);
</script></body></html>
