<!-- @dsCard group="Colors" viewport="700x150" name="Status" subtitle="Success · Warning · Danger · Info" -->
<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>body{margin:0;background:var(--bg);color:var(--text-strong);font-family:var(--font-body);padding:var(--sp-5)}</style>
</head><body><div style="display:flex;gap:calc(var(--sp-1) * 3.5)">
  <div style="flex:1"><div style="height:calc(var(--sp-1) * 18.5);border-radius:var(--r-lg);background:var(--success)"></div><div style="font-family:var(--font-mono);font-size:var(--fs-xs);color:var(--mute);margin-top:var(--sp-2);text-align:center">Success</div></div><div style="flex:1"><div style="height:calc(var(--sp-1) * 18.5);border-radius:var(--r-lg);background:var(--warning)"></div><div style="font-family:var(--font-mono);font-size:var(--fs-xs);color:var(--mute);margin-top:var(--sp-2);text-align:center">Warning</div></div><div style="flex:1"><div style="height:calc(var(--sp-1) * 18.5);border-radius:var(--r-lg);background:var(--danger)"></div><div style="font-family:var(--font-mono);font-size:var(--fs-xs);color:var(--mute);margin-top:var(--sp-2);text-align:center">Danger</div></div><div style="flex:1"><div style="height:calc(var(--sp-1) * 18.5);border-radius:var(--r-lg);background:var(--info)"></div><div style="font-family:var(--font-mono);font-size:var(--fs-xs);color:var(--mute);margin-top:var(--sp-2);text-align:center">Info</div></div>
</div></body></html>
