<!-- @dsCard group="Brand" viewport="700x200" name="Iconography — Phosphor" subtitle="Bold weight base · Fill active · accent on interaction" -->
<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="../node_modules/@phosphor-icons/web/src/bold/style.css">
<link rel="stylesheet" href="../node_modules/@phosphor-icons/web/src/fill/style.css">
<link rel="stylesheet" href="../node_modules/@phosphor-icons/web/src/duotone/style.css">
<style>
body{margin:0;background:var(--bg);color:var(--text-strong);font-family:var(--font-body);padding:calc(var(--sp-1) * 5.5)}
.grid{display:flex;gap:var(--sp-5);flex-wrap:wrap;font-size:26px;color:var(--bone-dim)}
.grid i{width:var(--icon-xl);text-align:center}
.sub{font-family:var(--font-mono);font-size:var(--dz-text-2xs);letter-spacing:var(--ls-label);color:var(--mute);text-transform:uppercase;margin:calc(var(--sp-1) * 4.5) 0 calc(var(--sp-1) * 2.5)}
.act{color:var(--crimson)}
.duo{color:var(--crimson);font-size:30px}
</style>
</head>
<body>
<div class="sub">Bold · general use</div>
<div class="grid">
<i class="ph-bold ph-squares-four"></i><i class="ph-bold ph-rocket-launch"></i><i class="ph-bold ph-git-branch"></i><i class="ph-bold ph-gauge"></i><i class="ph-bold ph-shield-check"></i><i class="ph-bold ph-terminal-window"></i><i class="ph-bold ph-cube"></i><i class="ph-bold ph-bell"></i><i class="ph-bold ph-magnifying-glass"></i><i class="ph-bold ph-gear-six"></i><i class="ph-bold ph-arrow-clockwise"></i><i class="ph-bold ph-plus"></i>
</div>
<div class="sub">Fill · active state · Duotone · highlighted</div>
<div class="grid">
<i class="ph-fill ph-squares-four act"></i><i class="ph-fill ph-shield-check act"></i><i class="ph-fill ph-bell act"></i>
<i class="ph-duotone ph-rocket-launch duo"></i><i class="ph-duotone ph-gauge duo"></i><i class="ph-duotone ph-lightning duo"></i>
</div>
</body>
</html>
