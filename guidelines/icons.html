<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/bold/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/fill/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/duotone/style.css">
<style>
body{margin:0;background:var(--bg);color:var(--text-strong);font-family:var(--font-body);padding:22px}
.grid{display:flex;gap:20px;flex-wrap:wrap;font-size:26px;color:var(--bone-dim)}
.grid i{width:34px;text-align:center}
.sub{font-family:var(--font-mono);font-size:10px;letter-spacing:.2em;color:var(--mute);text-transform:uppercase;margin:18px 0 10px}
.act{color:var(--crimson)}
.duo{color:var(--crimson);font-size:30px}
</style>
</head>
<body>
<div class="sub">Bold · uso general</div>
<div class="grid">
<i class="ph-bold ph-squares-four"></i><i class="ph-bold ph-rocket-launch"></i><i class="ph-bold ph-git-branch"></i><i class="ph-bold ph-gauge"></i><i class="ph-bold ph-shield-check"></i><i class="ph-bold ph-terminal-window"></i><i class="ph-bold ph-cube"></i><i class="ph-bold ph-bell"></i><i class="ph-bold ph-magnifying-glass"></i><i class="ph-bold ph-gear-six"></i><i class="ph-bold ph-arrow-clockwise"></i><i class="ph-bold ph-plus"></i>
</div>
<div class="sub">Fill · estado activo · Duotone · destacado</div>
<div class="grid">
<i class="ph-fill ph-squares-four act"></i><i class="ph-fill ph-shield-check act"></i><i class="ph-fill ph-bell act"></i>
<i class="ph-duotone ph-rocket-launch duo"></i><i class="ph-duotone ph-gauge duo"></i><i class="ph-duotone ph-lightning duo"></i>
</div>
</body>
</html>
