<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/fill/style.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/duotone/style.css">

<body>
<div id="root"></div>
<script type="text/babel" data-type="module" data-presets="react">
import React from 'react';
import { createRoot } from 'react-dom/client';
const { LoginScreen } = await arenaImport('./LoginScreen.jsx');
const { DashboardScreen } = await arenaImport('./DashboardScreen.jsx');
const { ProjectScreen } = await arenaImport('./ProjectScreen.jsx');
const { Toast } = await arenaImport('../../components/feedback/Toast.jsx');

function App(){
  const [screen, setScreen] = React.useState('login');
  const [project, setProject] = React.useState(null);
  const [toasts, setToasts] = React.useState([]);

  const pushToast = (t) => {
    const id = Math.random();
    setToasts((ts) => [...ts, { ...t, id }]);
    setTimeout(() => setToasts((ts) => ts.filter((x) => x.id !== id)), 4200);
  };

  const nav = (id) => {
    if (id === 'dashboard') { setScreen('dashboard'); setProject(null); }
    else setScreen('dashboard'); // otras secciones no implementadas en el demo
  };

  let view;
  if (screen === 'login') {
    view = <LoginScreen onLogin={() => setScreen('dashboard')} />;
  } else if (screen === 'project') {
    view = <ProjectScreen onNav={nav} project={project}
      onToast={() => pushToast({ tone: 'success', title: 'Despliegue en curso', message: 'build #4822 → producción' })} />;
  } else {
    view = <DashboardScreen onNav={nav}
      onOpenProject={(p) => { setProject(p); setScreen('project'); }} />;
  }

  return (
    <React.Fragment>
      {view}
      <div className="toast-wrap">
        {toasts.map((t) => (
          <Toast key={t.id} tone={t.tone} title={t.title} message={t.message}
            onClose={() => setToasts((ts) => ts.filter((x) => x.id !== t.id))} />
        ))}
      </div>
    </React.Fragment>
  );
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
