<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Delivery Console — Dravensoft</title>
<link rel="stylesheet" href="../../../../styles.css">
<!-- Applies the saved theme before first paint. ThemeToggle writes the same
     `draven-theme` key but only reads the live class, so without this the
     console would forget the choice on every reload. -->
<script src="../../../../theme.js"></script>
<link rel="stylesheet" href="../../../../node_modules/@phosphor-icons/web/src/bold/style.css">
<link rel="stylesheet" href="../../../../node_modules/@phosphor-icons/web/src/fill/style.css">
<link rel="stylesheet" href="../../../../node_modules/@phosphor-icons/web/src/duotone/style.css">
<style>
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--text-strong);font-family:var(--font-body)}
#root{height:100vh}
.toast-wrap{position:fixed;right:24px;bottom:24px;z-index:1200;display:flex;flex-direction:column;gap:12px}
</style>
<script type="importmap">
{"imports":{"react":"../../../../frameworks/react/vendor/react.js","react/jsx-runtime":"../../../../frameworks/react/vendor/react-jsx-runtime.js","react-dom/client":"../../../../frameworks/react/vendor/react-dom-client.js"}}
</script>
<script src="../../../../node_modules/@babel/standalone/babel.min.js"></script>
<script src="../../../../jsx-loader.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module" data-presets="react">
import React from 'react';
import { createRoot } from 'react-dom/client';
const { LoginScreen } = await arenaImport('./LoginScreen.jsx');
const { DashboardScreen } = await arenaImport('./DashboardScreen.jsx');
const { ProjectScreen } = await arenaImport('./ProjectScreen.jsx');
const { Toast } = await arenaImport('../../components/feedback/Toast.jsx');

function App(){
  const [screen, setScreen] = React.useState('login');
  const [project, setProject] = React.useState(null);
  const [toasts, setToasts] = React.useState([]);

  const pushToast = (t) => {
    const id = Math.random();
    setToasts((ts) => [...ts, { ...t, id }]);
    setTimeout(() => setToasts((ts) => ts.filter((x) => x.id !== id)), 4200);
  };

  const nav = (id) => {
    if (id === 'dashboard') { setScreen('dashboard'); setProject(null); }
    else setScreen('dashboard'); // other sections not implemented in the demo
  };

  let view;
  if (screen === 'login') {
    view = <LoginScreen onLogin={() => setScreen('dashboard')} />;
  } else if (screen === 'project') {
    view = <ProjectScreen onNav={nav} project={project}
      onToast={() => pushToast({ tone: 'success', title: 'Deployment in progress', message: 'build #4822 → production' })} />;
  } else {
    view = <DashboardScreen onNav={nav}
      onOpenProject={(p) => { setProject(p); setScreen('project'); }} />;
  }

  return (
    <React.Fragment>
      {view}
      <div className="toast-wrap">
        {toasts.map((t) => (
          <Toast key={t.id} tone={t.tone} title={t.title} message={t.message}
            onClose={() => setToasts((ts) => ts.filter((x) => x.id !== t.id))} />
        ))}
      </div>
    </React.Fragment>
  );
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
