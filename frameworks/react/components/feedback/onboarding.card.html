<!doctype html><html><head><meta charset="utf-8"><link rel="stylesheet" href="../../../styles.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/bold/style.css">
<style>body{margin:0;background:var(--bg);color:var(--text-strong);font-family:var(--font-body);padding:24px}.row{display:flex;flex-wrap:wrap;gap:14px;align-items:center;margin-bottom:16px}.sub{font-family:var(--font-mono);font-size:10px;letter-spacing:.2em;color:var(--mute);text-transform:uppercase;width:100%;margin-bottom:-2px}</style>
<script type="importmap">
{"imports":{"react":"https://esm.sh/react@18","react/jsx-runtime":"https://esm.sh/react@18/jsx-runtime","react-dom/client":"https://esm.sh/react-dom@18/client"}}
</script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="../../../jsx-loader.js"></script></head><body><div id="root"></div>
<script type="text/babel" data-type="module" data-presets="react">
import React from 'react';
import { createRoot } from 'react-dom/client';
const { Onboarding } = await arenaImport('../../components/feedback/Onboarding.jsx');
const { Button } = await arenaImport('../../components/forms/Button.jsx');
const steps = [
  {eyebrow:'Welcome',title:'Your first deployment',body:'From here you will deploy and roll back with one click.'},
  {title:'Command palette',body:'Press Cmd/Ctrl+K to run any action without the mouse.'},
  {title:'All set',body:'You can reopen this guide from Help anytime.'},
];
function Demo(){
  const [open,setOpen]=React.useState(true);
  const [step,setStep]=React.useState(0);
  return(<div>
    <div className="sub">Skip is offered on every step — a tour is never a trap</div>
    <div className="row">
      <Button variant="secondary" size="sm" onClick={()=>{setStep(0);setOpen(true);}}>Start tour</Button>
      <span style={{color:'var(--mute)',fontFamily:'var(--font-mono)',fontSize:12}}>
        Step <span style={{color:'var(--gold)'}}>{Math.min(step+1,steps.length)}</span> of {steps.length}
        {!open && ' · dismissed'}
      </span>
    </div>
    <Onboarding open={open} index={step} steps={steps}
      onNext={()=>setStep(s=>s+1)} onBack={()=>setStep(s=>s-1)}
      onSkip={()=>setOpen(false)} onDone={()=>setOpen(false)} />
  </div>);
}
createRoot(document.getElementById('root')).render(<Demo/>);
</script></body></html>
