<!doctype html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../../../styles.css">
<link rel="stylesheet" href="../../../../node_modules/@phosphor-icons/web/src/bold/style.css">
<link rel="stylesheet" href="../../../../node_modules/@phosphor-icons/web/src/fill/style.css">
<style>
body{margin:0;background:var(--bg);color:var(--text-strong);font-family:var(--font-body);padding:var(--sp-6)}
.row{display:flex;flex-wrap:wrap;gap:calc(var(--sp-1) * 3.5);align-items:center;margin-bottom:calc(var(--sp-1) * 4.5)}
/* The section label sits above its row, so it needs its own line box and a
   positive gap. It carried margin-bottom:-4px, which pulled the row up over
   the text -- invisible until the card pages started rendering again. */
.sub{font-family:var(--font-mono);font-size:var(--dz-text-2xs);letter-spacing:var(--ls-label);line-height:var(--lh-snug);color:var(--mute);text-transform:uppercase;width:100%;margin-bottom:var(--sp-1)}
</style>
<script type="importmap">
{"imports":{"react":"../../../../frameworks/react/vendor/react.js","react/jsx-runtime":"../../../../frameworks/react/vendor/react-jsx-runtime.js","react-dom/client":"../../../../frameworks/react/vendor/react-dom-client.js"}}
</script>
<script src="../../../../node_modules/@babel/standalone/babel.min.js"></script>
<script src="../../../../jsx-loader.js"></script>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-type="module" data-presets="react">
import React from 'react';
import { createRoot } from 'react-dom/client';
const { Button } = await arenaImport('../../components/forms/Button.jsx');
const { IconButton } = await arenaImport('../../components/forms/IconButton.jsx');
const { Input } = await arenaImport('../../components/forms/Input.jsx');
const { Select } = await arenaImport('../../components/forms/Select.jsx');
const { Checkbox } = await arenaImport('../../components/forms/Checkbox.jsx');
const { Switch } = await arenaImport('../../components/forms/Switch.jsx');
const { ThemeToggle } = await arenaImport('../../components/forms/ThemeToggle.jsx');
const plus = <i className="ph-bold ph-plus" style={{fontSize:16,lineHeight:1}} />;
function Demo(){
  const [chk,setChk]=React.useState(true);
  const [sw,setSw]=React.useState(true);
  return (
    <div>
      <div className="sub">Button — variants</div>
      <div className="row">
        <Button variant="primary" icon={plus}>Deploy</Button>
        <Button variant="secondary">Roll back</Button>
        <Button variant="ghost">Cancel</Button>
        <Button variant="danger">Delete</Button>
        <Button variant="primary" loading>Deploying</Button>
        <Button variant="primary" disabled>Locked</Button>
      </div>
      <div className="sub">Sizes · IconButton</div>
      <div className="row">
        <Button size="sm" variant="secondary">sm</Button>
        <Button size="md" variant="secondary">md</Button>
        <Button size="lg" variant="secondary">lg</Button>
        <IconButton label="New" variant="solid">{plus}</IconButton>
        <IconButton label="New">{plus}</IconButton>
      </div>
      <div className="sub">Input · Select</div>
      <div className="row" style={{alignItems:'flex-start'}}>
        <Input label="Repository" prefix="git@" placeholder="org/project" style={{width:220}} />
        <Input label="Email" error="Invalid format" defaultValue="hello@" style={{width:200}} />
        <Select label="Environment" options={['Production','Staging','QA']} style={{width:180}} />
      </div>
      <div className="sub">Input — native date and time</div>
      <div className="row" style={{alignItems:'flex-start'}}>
        <Input label="Deploy date" type="date" required style={{width:200}} />
        <Input label="Window start" type="time" hint="Local time" style={{width:200}} />
        <Input label="Cutover" type="datetime-local" style={{width:240}} />
        <Input label="Deadline" type="date" error="Pick a date in the future" style={{width:200}} />
      </div>
      <div className="sub">Checkbox · Switch</div>
      <div className="row">
        <Checkbox checked={chk} onChange={e=>setChk(e.target.checked)} label="Notify on approval" />
        <Switch checked={sw} onChange={e=>setSw(e.target.checked)} label="Automatic deployment" />
      </div>
      <div className="sub">ThemeToggle</div>
      <div className="row"><ThemeToggle /><span style={{fontSize:13,color:'var(--mute)'}}>Flips the whole page — every component re-themes from tokens alone.</span></div>
    </div>
  );
}
createRoot(document.getElementById('root')).render(<Demo/>);
</script>
</body>
</html>
