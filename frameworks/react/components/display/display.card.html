<script type="text/babel" data-type="module" data-presets="react">
import React from 'react';
import { createRoot } from 'react-dom/client';
const { Card } = await arenaImport('../../components/display/Card.jsx');
const { Badge } = await arenaImport('../../components/display/Badge.jsx');
const { Tag } = await arenaImport('../../components/display/Tag.jsx');
const { StatCard } = await arenaImport('../../components/display/StatCard.jsx');
function Demo(){return (<div>
  <div className="sub">Badge — tones</div>
  <div className="row">
    <Badge tone="success" dot>Deployed</Badge>
    <Badge tone="warning">In review</Badge>
    <Badge tone="danger" dot>Down</Badge>
    <Badge tone="accent">New</Badge>
    <Badge tone="gold">Priority</Badge>
    <Badge tone="info">v2.4</Badge>
    <Badge>Draft</Badge>
  </div>
  <div className="sub">Tag</div>
  <div className="row"><Tag>TypeScript</Tag><Tag>PostgreSQL</Tag><Tag onRemove={()=>{}}>React</Tag></div>
  <div className="sub">Card</div>
  <div className="row" style={{alignItems:'stretch'}}>
    <Card eyebrow="Delivery" title="Client Portal" action={<Badge tone="success" dot>Deployed</Badge>} style={{width:300}}>
      <div style={{color:'var(--mute)',fontSize:14,lineHeight:1.6}}>Last published 2 h ago · build #4821</div>
    </Card>
    <Card accent floating title="Latency alert" style={{width:280}}>
      <div style={{color:'var(--mute)',fontSize:14,lineHeight:1.6}}>p95 rose to 340 ms on checkout.</div>
    </Card>
  </div>
  <div className="sub">StatCard — delta tone is sentiment, not direction</div>
  <div className="row" style={{alignItems:'stretch'}}>
    <StatCard label="Deploys" value="128" delta={{value:'+12%',direction:'up',tone:'positive'}} sub="vs last week" style={{flex:1}} />
    <StatCard label="p95 latency" value="340 ms" delta={{value:'-18%',direction:'down',tone:'positive'}} sub="vs last week" style={{flex:1}} />
    <StatCard label="Open incidents" value="3" delta={{value:'+2',direction:'up',tone:'negative'}} sub="2 acknowledged" style={{flex:1}} />
    <StatCard label="Build time" value="4m 12s" delta={{value:'+3s',direction:'up'}} style={{flex:1}} />
  </div>
</div>);}
createRoot(document.getElementById('root')).render(<Demo/>);
</script></body></html>
