<!-- @dsCard group="Angular" viewport="700x665" name="ErrorState" subtitle="Failure and recovery, rendered from ErrorState.manifest.json" -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../../styles.css">
<link rel="stylesheet" href="../utilities.css">
<link rel="stylesheet" href="../specimen.css">
</head><body><div id="root"></div>
<script type="module">
import { mountSpecimen, section, el, classesFor } from '../specimen.js';

const manifest = await (await fetch('./ErrorState.manifest.json')).json();
const c = classesFor(manifest);

function errorState({ icon, title, message, code, retryLabel }) {
  const root = el('div', { class: c.root, role: 'alert' },
    el('div', { class: c.icon }, el('i', { class: icon, 'aria-hidden': 'true' })),
    el('div', { class: c.title, text: title }),
    el('div', { class: c.message, text: message }));
  if (code) root.append(el('code', { class: c.code, text: code }));
  if (retryLabel) {
    /* Under the API contract Arena draws this button itself, styled by the
       manifest's own retry slot -- not a consumer's projected mat-button.
       Rendered only when a retry label was actually given, the same gate
       the real component applies to retryLabel(). */
    const actions = el('div', { class: c.actions });
    actions.append(el('button', { class: c.retry, type: 'button', text: retryLabel }));
    root.append(actions);
  }
  return root;
}

mountSpecimen({ sections: [
  section('With a support code and a retry', [errorState({ icon: 'ph-bold ph-plugs', title: "Couldn't reach the delivery API", message: 'The dashboard is showing the last data it cached.', code: 'ERR_UPSTREAM_504', retryLabel: 'Retry' })], { stack: true }),
  section('Bare', [errorState({ icon: 'ph-bold ph-warning-octagon', title: 'Something went wrong', message: 'Reload the page. If it keeps happening, the status page has more.' })], { stack: true }),
]});
</script></body></html>
