<!-- @dsCard group="Angular" viewport="760x549" name="Onboarding" subtitle="Coachmark and progress, rendered from Onboarding.manifest.json" -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../../styles.css">
<link rel="stylesheet" href="../utilities.css">
<link rel="stylesheet" href="../specimen.css">
<style>.static-panel{position:static!important}</style>
</head><body><div id="root"></div>
<script type="module">
import { mountSpecimen, section, el, classesFor } from '../specimen.js';

const manifest = await (await fetch('./Onboarding.manifest.json')).json();

/* `panel` is `fixed`, which a specimen showing two states side by side cannot use --
   `.static-panel` unpins it here and changes nothing else. The third section renders
   `root` for real (open: true, un-pinned panel included), so the scrim and the open
   variant this whole primitive host-binds are actually visible somewhere in the only
   visual artifact of this component -- the same reason ConfirmDialog.card.html's own
   third section exists. */
function coachmark({ eyebrow, title, body, index, total }) {
  const c = classesFor(manifest, { placement: 'floating' });
  const dots = el('div', { class: c.dots });
  for (let i = 0; i < total; i++) dots.append(el('span', { class: `${c.dot} ${i === index ? c.dotOn : c.dotOff}` }));
  const foot = el('div', { class: c.foot }, dots);
  if (index > 0) foot.append(el('button', { class: c.text, type: 'button', text: 'Back' }));
  if (index < total - 1) foot.append(el('button', { class: c.text, type: 'button', text: 'Skip' }));
  foot.append(el('button', { class: c.next, type: 'button', text: index === total - 1 ? 'Got it' : 'Next' }));
  return el('div', { class: `${c.panel} static-panel` },
    el('div', { class: c.eyebrow, text: eyebrow }),
    el('div', { class: c.title, text: title }),
    el('div', { class: c.body, text: body }),
    foot);
}

function overlay() {
  const c = classesFor(manifest, { open: 'true', placement: 'floating' });
  const dots = el('div', { class: c.dots });
  for (let i = 0; i < 3; i++) dots.append(el('span', { class: `${c.dot} ${i === 0 ? c.dotOn : c.dotOff}` }));
  const foot = el('div', { class: c.foot }, dots,
    el('button', { class: c.text, type: 'button', text: 'Skip' }),
    el('button', { class: c.next, type: 'button', text: 'Next' }));
  const panel = el('div', { class: c.panel },
    el('div', { class: c.eyebrow, text: 'Getting started' }),
    el('div', { class: c.title, text: 'Cmd+K runs anything' }),
    el('div', { class: c.body, text: 'The command palette reaches every action without leaving the keyboard.' }),
    foot);
  return el('div', { class: c.root }, panel);
}

mountSpecimen({ sections: [
  section('First step', [coachmark({ eyebrow: 'Getting started', title: 'This is the delivery board', body: 'Every project your team is shipping, grouped by client.', index: 0, total: 3 })]),
  section('Last step', [coachmark({ eyebrow: 'Getting started', title: 'Press Cmd+K anywhere', body: 'The command palette runs any action without leaving the keyboard.', index: 2, total: 3 })]),
  section('The root slot: the fixed scrim, open', [overlay()]),
]});
</script></body></html>
