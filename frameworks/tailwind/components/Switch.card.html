<!-- @dsCard group="Tailwind" viewport="700x330" name="Switch" subtitle="Sizes, orientation, icon-per-state and guarded, rendered from Switch.manifest.json" -->
<!doctype html><html><head><meta charset="utf-8">
<link rel="stylesheet" href="../../../styles.css">
<link rel="stylesheet" href="../utilities.css">
<link rel="stylesheet" href="../specimen.css">
</head><body><div id="root"></div>
<script type="module">
import { mountSpecimen, section, el, classesFor } from '../specimen.js';

const manifest = await (await fetch('./Switch.manifest.json')).json();

/* `footprint` and `thumb` are derived variants that exist only because
 * manifest-classes.js (this harness) does not support tailwind-variants'
 * compoundVariants -- track's width/height genuinely depend on BOTH size
 * and orientation, and the knob's translate direction genuinely depends on
 * BOTH checked and orientation, so those two crossed pairs are flattened
 * into their own enumerated variants rather than declared as a compound.
 * A real tv() consumer would use compoundVariants instead; Switch has none
 * (React-only, no Angular primitive), so this demo computes the flattened
 * keys itself the same way a future Angular recipe would need to. */
function toggle({ label, size = 'md', orientation = 'horizontal', checked = false, disabled = false, confirm = false, iconOn, iconOff }) {
  const footprint = `${orientation}-${size}`;
  const thumb = `${checked ? 'on' : 'off'}-${orientation}`;
  const c = classesFor(manifest, { size, orientation, checked: String(checked), disabled: String(disabled), footprint, thumb });
  const icon = checked ? iconOn : iconOff;
  const knob = el('span', { class: c.knob }, icon ? el('i', { class: `${c.icon} ${icon}` }) : '');
  const track = el('button', { type: 'button', role: 'switch', class: c.track, 'aria-checked': String(checked), 'aria-label': label, disabled: disabled || undefined }, knob);
  const text = el('span', { class: c.label }, label);
  if (confirm) text.append(el('i', { class: `${c.guard} ph-bold ph-shield-check`, title: 'Requires confirmation' }));
  return el('span', { class: c.root }, track, text);
}

mountSpecimen({ sections: [
  section('States', [
    toggle({ label: 'Email notifications', checked: true, iconOn: 'ph-bold ph-check', iconOff: 'ph-bold ph-x' }),
    toggle({ label: 'Slack notifications', iconOn: 'ph-bold ph-check', iconOff: 'ph-bold ph-x' }),
    toggle({ label: 'Managed by policy', checked: true, disabled: true }),
  ]),
  section('Sizes — sm to 2xl', ['sm', 'md', 'lg', 'xl', '2xl'].map((size) =>
    toggle({ label: size, size, checked: true, iconOn: 'ph-bold ph-check' })
  )),
  section('Orientation', [
    toggle({ label: 'Horizontal', orientation: 'horizontal', checked: true, iconOn: 'ph-bold ph-check' }),
    toggle({ label: 'Vertical', orientation: 'vertical', checked: true, iconOn: 'ph-bold ph-check' }),
  ]),
  section('Guarded — opens a confirmation instead of flipping', [
    toggle({ label: 'Auto-deploy to production', checked: true, confirm: true }),
  ]),
]});
</script></body></html>
